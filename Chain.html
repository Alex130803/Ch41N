<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chain — Web3 Engagement App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #0a0a14; min-height: 100%; }
  * { box-sizing: border-box; }
  body {
    font-family: 'Manrope', system-ui, sans-serif; color: #fff;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(124,58,237,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(6,182,212,0.12) 0%, transparent 50%),
      #0a0a14;
  }

  .vx-phone {
    width: 390px; height: 844px;
    border-radius: 44px; overflow: hidden; position: relative;
    background: #080810;
    box-shadow:
      0 50px 100px rgba(0,0,0,0.5),
      0 0 0 10px #1a1525,
      0 0 0 11px #2a2435,
      0 0 60px rgba(124,58,237,0.15);
  }
  .vx-phone::before {
    content: ''; position: absolute; top: 10px; left: 50%;
    transform: translateX(-50%); width: 110px; height: 30px;
    background: #000; border-radius: 18px; z-index: 100;
  }
  .vx-phone::after {
    content: ''; position: absolute; bottom: 6px; left: 50%;
    transform: translateX(-50%); width: 130px; height: 4px;
    background: rgba(255,255,255,0.35); border-radius: 2px; z-index: 200; pointer-events: none;
  }
  .vx-phone-inner { width: 100%; height: 100%; position: relative; overflow: hidden; }
  .vx-phone-inner ::-webkit-scrollbar { width: 0; }
  .vx-phone-inner * { scrollbar-width: none; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>

<script type="text/babel" data-presets="react">
const VX = {
  bg: '#080810',
  card: '#111127',
  cardHi: '#161638',
  stroke: 'rgba(255,255,255,0.06)',
  strokeHi: 'rgba(124,58,237,0.4)',
  primary: '#7c3aed',
  primaryHi: '#a855f7',
  cyan: '#06b6d4',
  green: '#10b981',
  gold: '#f59e0b',
  red: '#ef4444',
  text: '#f1f0ff',
  muted: '#7c7a9a',
  dim: '#4a476a',
  gradPurple: 'linear-gradient(135deg, #7c3aed 0%, #a855f7 100%)',
  gradAccent: 'linear-gradient(135deg, #7c3aed 0%, #06b6d4 100%)',
  gradGold: 'linear-gradient(135deg, #f59e0b 0%, #ec4899 100%)',
  gradGreen: 'linear-gradient(135deg, #059669 0%, #10b981 100%)',
  syne: '"Manrope", ui-sans-serif, system-ui, sans-serif',
  dm: '"Manrope", ui-sans-serif, system-ui, sans-serif',
};

function VXScreen({ children, scroll = true, padBottom = 90 }) {
  return (
    <div style={{
      width: '100%', height: '100%', background: VX.bg, color: VX.text,
      fontFamily: VX.dm, position: 'relative', overflow: scroll ? 'auto' : 'hidden',
      paddingBottom: padBottom,
    }}>{children}</div>
  );
}

function VXStatusBar({ light = true }) {
  const c = light ? '#f1f0ff' : '#000';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      padding: '14px 24px 8px', fontFamily: VX.dm, fontWeight: 600,
      fontSize: 15, color: c, position: 'relative', zIndex: 20,
    }}>
      <span>9:41</span>
      <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
        <svg width="17" height="11" viewBox="0 0 17 11" fill="none">
          <rect x="0" y="7" width="3" height="4" rx="0.5" fill={c}/>
          <rect x="4.5" y="5" width="3" height="6" rx="0.5" fill={c}/>
          <rect x="9" y="2.5" width="3" height="8.5" rx="0.5" fill={c}/>
          <rect x="13.5" y="0" width="3" height="11" rx="0.5" fill={c}/>
        </svg>
        <svg width="24" height="11" viewBox="0 0 24 11" fill="none">
          <rect x="0.5" y="0.5" width="20" height="10" rx="2.5" stroke={c} strokeOpacity="0.4" fill="none"/>
          <rect x="2" y="2" width="17" height="7" rx="1.5" fill={c}/>
          <path d="M22 3.5V7.5C22.6 7.3 23 6.7 23 6C23 5.3 22.6 4.7 22 3.5Z" fill={c} fillOpacity="0.5"/>
        </svg>
      </div>
    </div>
  );
}

function VXBottomNav({ active, onNav }) {
  const items = [
    { id: 'dashboard', label: 'Home', icon: (c) => <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M3 9l8-6 8 6v10a1 1 0 01-1 1h-4v-7h-6v7H4a1 1 0 01-1-1V9z" stroke={c} strokeWidth="1.7" strokeLinejoin="round"/></svg> },
    { id: 'tasks', label: 'Tasks', icon: (c) => <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 2l2.5 6 6.5.5-5 4.5 1.5 6.5L11 16l-5.5 3.5L7 13 2 8.5 8.5 8 11 2z" stroke={c} strokeWidth="1.6" strokeLinejoin="round"/></svg> },
    { id: 'vip', label: 'VIP', icon: (c) => <svg width="24" height="22" viewBox="0 0 24 22" fill="none"><path d="M12 2l10 6v6l-10 6L2 14V8l10-6z" stroke={c} strokeWidth="1.6" strokeLinejoin="round"/></svg> },
    { id: 'withdraw', label: 'Withdraw', icon: (c) => <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 16V4M11 4l-5 5M11 4l5 5M3 18h16" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg> },
    { id: 'profile', label: 'Profile', icon: (c) => <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="7.5" r="3.5" stroke={c} strokeWidth="1.7"/><path d="M4 19c1.5-3.5 4.2-5 7-5s5.5 1.5 7 5" stroke={c} strokeWidth="1.7" strokeLinecap="round"/></svg> },
  ];
  return (
    <div style={{
      position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 30,
      background: 'rgba(8,8,16,0.85)',
      backdropFilter: 'blur(24px) saturate(180%)',
      WebkitBackdropFilter: 'blur(24px) saturate(180%)',
      borderTop: `1px solid ${VX.stroke}`,
      paddingBottom: 18,
    }}>
      <div style={{ display: 'flex', alignItems: 'stretch', justifyContent: 'space-around', padding: '10px 8px 4px' }}>
        {items.map(it => {
          const isOn = active === it.id;
          return (
            <button key={it.id} onClick={() => onNav(it.id)} style={{
              flex: 1, background: 'transparent', border: 'none', cursor: 'pointer',
              display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
              padding: '6px 0 4px', position: 'relative',
              color: isOn ? VX.primaryHi : VX.muted,
              fontFamily: VX.dm, fontSize: 10.5, fontWeight: 600, letterSpacing: 0.2,
            }}>
              {isOn && (
                <div style={{
                  position: 'absolute', top: -11, left: '50%', transform: 'translateX(-50%)',
                  width: 28, height: 2, borderRadius: 2, background: VX.primaryHi,
                  boxShadow: `0 0 8px ${VX.primaryHi}`,
                }} />
              )}
              {it.icon(isOn ? VX.primaryHi : VX.muted)}
              <span>{it.label}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

function VXGradientText({ children, grad = VX.gradPurple, style = {} }) {
  return (
    <span style={{
      background: grad, WebkitBackgroundClip: 'text', backgroundClip: 'text',
      WebkitTextFillColor: 'transparent', color: 'transparent',
      ...style,
    }}>{children}</span>
  );
}

function VXButton({ children, variant = 'primary', onClick, style = {}, disabled }) {
  const base = {
    width: '100%', padding: '15px 18px', borderRadius: 8, border: 'none',
    fontFamily: VX.dm, fontSize: 15, fontWeight: 700, letterSpacing: 0.2,
    cursor: disabled ? 'not-allowed' : 'pointer', opacity: disabled ? 0.4 : 1,
    color: '#fff', transition: 'transform .12s, opacity .12s',
    display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
    ...style,
  };
  const bg = variant === 'primary' ? VX.gradAccent
    : variant === 'purple' ? VX.gradPurple
    : variant === 'green' ? VX.gradGreen
    : variant === 'outline' ? 'transparent'
    : 'rgba(255,255,255,0.04)';
  const border = variant === 'outline' ? `1.5px solid ${VX.strokeHi}` : 'none';
  return <button onClick={onClick} disabled={disabled} style={{ ...base, background: bg, border }}>{children}</button>;
}

function VXInput({ label, value, onChange, type = 'text', placeholder, iconLeft, iconRight, focused, onFocus, onBlur }) {
  return (
    <div style={{ marginBottom: 14 }}>
      {label && <label style={{ display: 'block', fontSize: 12, color: VX.muted, marginBottom: 6, fontWeight: 500, letterSpacing: 0.3 }}>{label}</label>}
      <div style={{
        display: 'flex', alignItems: 'center',
        background: VX.card, borderRadius: 12,
        border: `1.5px solid ${focused ? VX.primary : VX.stroke}`,
        padding: '0 14px', transition: 'border .15s',
        boxShadow: focused ? `0 0 0 4px rgba(124,58,237,0.12)` : 'none',
      }}>
        {iconLeft && <div style={{ marginRight: 10, color: VX.muted }}>{iconLeft}</div>}
        <input type={type} value={value || ''} onChange={onChange} placeholder={placeholder}
          onFocus={onFocus} onBlur={onBlur}
          style={{
            flex: 1, background: 'transparent', border: 'none', outline: 'none',
            color: VX.text, fontSize: 15, fontFamily: VX.dm,
            padding: '15px 0',
          }} />
        {iconRight && <div style={{ marginLeft: 10, color: VX.muted }}>{iconRight}</div>}
      </div>
    </div>
  );
}

function VXPlatformIcon({ platform, size = 40 }) {
  const common = { width: size, height: size, borderRadius: size * 0.28, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 };
  if (platform === 'ig') return (
    <div style={{ ...common, background: 'linear-gradient(135deg, #fdf497 0%, #fd5949 45%, #d6249f 70%, #285AEB 100%)' }}>
      <svg width={size*0.55} height={size*0.55} viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2">
        <rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="#fff"/>
      </svg>
    </div>
  );
  if (platform === 'tt') return (
    <div style={{ ...common, background: '#0a0a0a', border: '1px solid rgba(255,255,255,0.08)' }}>
      <svg width={size*0.5} height={size*0.5} viewBox="0 0 24 24" fill="none">
        <path d="M14 4v11.5a3.5 3.5 0 11-3.5-3.5" stroke="#25F4EE" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        <path d="M15 4v11.5a3.5 3.5 0 11-3.5-3.5M15 4c.5 2.5 2 4 4.5 4.2" stroke="#FE2C55" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ transform: 'translate(1.5px,1px)' }}/>
        <path d="M14 4c.5 2.5 2 4 4.5 4.2" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
    </div>
  );
  if (platform === 'yt') return (
    <div style={{ ...common, background: '#FF0000' }}>
      <svg width={size*0.5} height={size*0.5} viewBox="0 0 24 24" fill="#fff"><path d="M9 17V7l8 5-8 5z"/></svg>
    </div>
  );
  if (platform === 'tw') return (
    <div style={{ ...common, background: '#0a0a0a' }}>
      <svg width={size*0.45} height={size*0.45} viewBox="0 0 24 24" fill="#fff"><path d="M18 3h3l-7 8 8 10h-6l-5-6-5 6H3l7-9L2 3h6l4 5 6-5z"/></svg>
    </div>
  );
  return <div style={common} />;
}

function LoginScreen({ onLogin, onSignup }) {
  const [phone, setPhone] = React.useState('+1 (415) 555 0182');
  const [pw, setPw] = React.useState('••••••••');
  const [showPw, setShowPw] = React.useState(false);
  const [focus, setFocus] = React.useState(null);
  return (
    <VXScreen padBottom={0}>
      <VXStatusBar />
      <div style={{ position: 'absolute', top: 110, left: '50%', transform: 'translateX(-50%)',
        width: 340, height: 340, borderRadius: '50%',
        background: 'radial-gradient(circle, rgba(124,58,237,0.5) 0%, rgba(168,85,247,0.2) 40%, transparent 70%)',
        filter: 'blur(20px)', pointerEvents: 'none', zIndex: 0,
      }} />
      <div style={{ position: 'absolute', bottom: -80, right: -60,
        width: 280, height: 280, borderRadius: '50%',
        background: 'radial-gradient(circle, rgba(6,182,212,0.25) 0%, transparent 70%)',
        filter: 'blur(30px)', pointerEvents: 'none', zIndex: 0,
      }} />

      <div style={{ position: 'relative', zIndex: 1, padding: '24px 24px 40px' }}>
        <div style={{ textAlign: 'center', marginTop: 46, marginBottom: 42 }}>
          <div style={{ display: 'inline-flex', alignItems: 'center', gap: 10, marginBottom: 10 }}>
            <svg width="34" height="34" viewBox="0 0 34 34" fill="none">
              <defs><linearGradient id="logoG" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stopColor="#7c3aed"/><stop offset="1" stopColor="#06b6d4"/></linearGradient></defs>
              <path d="M17 2L30 9.5v15L17 32L4 24.5v-15L17 2z" stroke="url(#logoG)" strokeWidth="2.2" fill="none"/>
              <path d="M17 10L24 14v7l-7 4l-7-4v-7l7-4z" fill="url(#logoG)" opacity="0.25"/>
              <circle cx="17" cy="17" r="3" fill="url(#logoG)"/>
            </svg>
            <span style={{ fontFamily: VX.syne, fontSize: 32, fontWeight: 800, letterSpacing: -1 }}>
              <VXGradientText grad={VX.gradAccent}>Chain</VXGradientText>
            </span>
          </div>
          <div style={{ color: VX.muted, fontSize: 13, letterSpacing: 0.4 }}>Web3 Engagement Platform</div>
        </div>

        <VXInput label="PHONE NUMBER" value={phone} onChange={e => setPhone(e.target.value)}
          placeholder="+1 (555) 000 0000" type="tel" focused={focus==='phone'}
          onFocus={()=>setFocus('phone')} onBlur={()=>setFocus(null)}
          iconLeft={<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4 2h3l1.5 4-2 1.5a10 10 0 004 4l1.5-2 4 1.5v3a1.5 1.5 0 01-1.5 1.5A13 13 0 012.5 3.5 1.5 1.5 0 014 2z" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round"/></svg>} />
        <VXInput label="PASSWORD" value={pw} onChange={e => setPw(e.target.value)}
          type={showPw ? 'text' : 'password'} placeholder="••••••••"
          focused={focus==='pw'}
          onFocus={()=>setFocus('pw')} onBlur={()=>setFocus(null)}
          iconLeft={<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="3" y="8" width="12" height="8" rx="1.5" stroke="currentColor" strokeWidth="1.5"/><path d="M5.5 8V5.5a3.5 3.5 0 017 0V8" stroke="currentColor" strokeWidth="1.5" fill="none"/></svg>}
          iconRight={<span onClick={() => setShowPw(s=>!s)} style={{cursor:'pointer', display:'flex'}}>{showPw
            ? <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2 9s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z" stroke="currentColor" strokeWidth="1.5"/><circle cx="9" cy="9" r="2" stroke="currentColor" strokeWidth="1.5"/></svg>
            : <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2 9s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z" stroke="currentColor" strokeWidth="1.5"/><path d="M3 3l12 12" stroke="currentColor" strokeWidth="1.5"/></svg>
          }</span>} />

        <div style={{ textAlign: 'right', marginTop: -4, marginBottom: 22 }}>
          <a style={{ color: VX.muted, fontSize: 13, textDecoration: 'none' }}>Forgot password?</a>
        </div>

        <VXButton variant="primary" onClick={onLogin} style={{ height: 52, fontSize: 15.5, boxShadow: '0 10px 30px -10px rgba(124,58,237,0.6)' }}>
          Connect & Login
          <svg width="16" height="14" viewBox="0 0 16 14" fill="none"><path d="M1 7h13M9 2l5 5-5 5" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </VXButton>

        <div style={{ textAlign: 'center', marginTop: 28, fontSize: 13, color: VX.muted }}>
          Don't have an account?{' '}
          <a onClick={onSignup} style={{ color: VX.primaryHi, fontWeight: 600, cursor: 'pointer' }}>Sign Up</a>
        </div>
      </div>
    </VXScreen>
  );
}

function SignupScreen({ onBack, onDone }) {
  const [name, setName] = React.useState('Alex Cipher');
  const [phone, setPhone] = React.useState('');
  const [pw, setPw] = React.useState('Vault2026!');
  const [pw2, setPw2] = React.useState('');
  const [ref, setRef] = React.useState('');
  const [vip, setVip] = React.useState(0);
  const [focus, setFocus] = React.useState(null);

  const strength = pw.length < 4 ? 0 : pw.length < 8 ? 1 : pw.length < 10 ? 2 : 3;
  const strLabels = ['', 'Weak', 'Medium', 'Strong'];
  const strColors = [VX.stroke, VX.red, VX.gold, VX.green];

  const tiers = [
    { name: 'VIP0', price: 'Free', daily: '$0.50', tasks: 3 },
    { name: 'VIP1', price: '$150', daily: '$4', tasks: 8 },
    { name: 'VIP2', price: '$400', daily: '$12', tasks: 14 },
    { name: 'VIP3', price: '$1,300', daily: '$44', tasks: 22 },
  ];

  return (
    <VXScreen padBottom={40}>
      <VXStatusBar />
      <div style={{ padding: '8px 20px 32px' }}>
        <button onClick={onBack} style={{
          background: VX.card, border: `1px solid ${VX.stroke}`, width: 40, height: 40,
          borderRadius: 12, display: 'flex', alignItems: 'center', justifyContent: 'center',
          cursor: 'pointer', color: VX.text,
        }}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 2L4 8l6 6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </button>

        <div style={{ textAlign: 'center', margin: '20px 0 28px' }}>
          <div style={{ fontFamily: VX.syne, fontSize: 26, fontWeight: 800, letterSpacing: -0.6 }}>
            <VXGradientText grad={VX.gradAccent}>⬡ Chain</VXGradientText>
          </div>
          <div style={{ color: VX.muted, fontSize: 13, marginTop: 4 }}>Create your account</div>
        </div>

        <VXInput label="FULL NAME" value={name} onChange={e=>setName(e.target.value)}
          focused={focus==='name'} onFocus={()=>setFocus('name')} onBlur={()=>setFocus(null)}
          iconLeft={<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="6" r="3" stroke="currentColor" strokeWidth="1.5"/><path d="M3 16c1.5-3 3.5-4 6-4s4.5 1 6 4" stroke="currentColor" strokeWidth="1.5" fill="none"/></svg>} />
        <VXInput label="PHONE NUMBER" value={phone} placeholder="+1 (555) 000 0000" type="tel" onChange={e=>setPhone(e.target.value)}
          focused={focus==='ph'} onFocus={()=>setFocus('ph')} onBlur={()=>setFocus(null)}
          iconLeft={<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4 2h3l1.5 4-2 1.5a10 10 0 004 4l1.5-2 4 1.5v3a1.5 1.5 0 01-1.5 1.5A13 13 0 012.5 3.5 1.5 1.5 0 014 2z" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round"/></svg>} />

        <VXInput label="PASSWORD" value={pw} type="password" onChange={e=>setPw(e.target.value)}
          focused={focus==='pw'} onFocus={()=>setFocus('pw')} onBlur={()=>setFocus(null)} />
        {pw && (
          <div style={{ marginTop: -10, marginBottom: 14, paddingLeft: 2 }}>
            <div style={{ display: 'flex', gap: 4, marginBottom: 6 }}>
              {[1,2,3].map(i => (
                <div key={i} style={{ flex: 1, height: 3, borderRadius: 2, background: i <= strength ? strColors[strength] : VX.stroke }}/>
              ))}
            </div>
            <div style={{ fontSize: 11, color: strColors[strength] || VX.muted, fontWeight: 600, letterSpacing: 0.3 }}>{strLabels[strength]}</div>
          </div>
        )}

        <VXInput label="CONFIRM PASSWORD" value={pw2} type="password" onChange={e=>setPw2(e.target.value)}
          focused={focus==='pw2'} onFocus={()=>setFocus('pw2')} onBlur={()=>setFocus(null)} />
        <VXInput label="REFERRAL CODE" value={ref} placeholder="Enter referral code" onChange={e=>setRef(e.target.value)}
          focused={focus==='ref'} onFocus={()=>setFocus('ref')} onBlur={()=>setFocus(null)} />

        <div style={{ marginTop: 18, marginBottom: 22 }}>
          <div style={{ fontSize: 12, color: VX.muted, marginBottom: 10, fontWeight: 500, letterSpacing: 0.3 }}>STARTER PACKAGE</div>
          <div style={{ display: 'flex', gap: 10, overflowX: 'auto', paddingBottom: 6, margin: '0 -20px', padding: '0 20px 6px' }}>
            {tiers.map((t, i) => {
              const sel = vip === i;
              return (
                <div key={i} onClick={() => setVip(i)} style={{
                  flexShrink: 0, width: 120, padding: '14px 12px',
                  background: sel ? 'linear-gradient(180deg, rgba(124,58,237,0.18), rgba(124,58,237,0.04))' : VX.card,
                  border: `1.5px solid ${sel ? VX.primary : VX.stroke}`,
                  borderRadius: 14, cursor: 'pointer',
                  boxShadow: sel ? `0 0 24px -4px ${VX.primary}` : 'none',
                  transition: 'all .15s',
                }}>
                  <div style={{ fontFamily: VX.syne, fontWeight: 800, fontSize: 16, color: sel ? VX.primaryHi : VX.text }}>{t.name}</div>
                  <div style={{ fontSize: 18, fontFamily: VX.syne, fontWeight: 700, marginTop: 4 }}>{t.price}</div>
                  <div style={{ fontSize: 11, color: VX.muted, marginTop: 6, lineHeight: 1.4 }}>
                    <div>{t.daily}/day</div>

  const remaining = total - completed;

  const toggle = (i) => {
    setDone(prev => {
      const n = new Set(prev);
      if (n.has(i)) n.delete(i); else n.add(i);
      return n;
    });
  };

  return (
    <VXScreen>
      <VXStatusBar />
      <div style={{ padding: '8px 20px 14px', display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between' }}>
        <div>
          <div style={{ fontFamily: VX.syne, fontSize: 28, fontWeight: 900, letterSpacing: -0.6 }}>Tasks</div>
          <div style={{ fontSize: 12, color: VX.muted, marginTop: 2 }}>Earn per action · Reset daily</div>
        </div>
        <div style={{ padding: '5px 12px', background: 'rgba(124,58,237,0.14)', borderRadius: 99, color: VX.primaryHi, fontSize: 12, fontWeight: 700, border: `1px solid ${VX.strokeHi}` }}>
          {remaining} left today
        </div>
      </div>

      <div style={{ margin: '6px 20px 14px', padding: '14px 16px', background: VX.card, borderRadius: 14, border: `1px solid ${VX.stroke}` }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
          <div style={{ fontSize: 12, color: VX.muted }}>Progress today</div>
          <div style={{ fontFamily: VX.syne, fontWeight: 800, fontSize: 13 }}>
            {completed}<span style={{ color: VX.muted }}>/{total}</span>
          </div>
        </div>
        <div style={{ height: 6, borderRadius: 3, background: 'rgba(255,255,255,0.05)', overflow: 'hidden' }}>
          <div style={{ width: `${(completed/total)*100}%`, height: '100%', background: VX.gradAccent, borderRadius: 3, boxShadow: `0 0 10px ${VX.cyan}`, transition: 'width .3s' }} />
        </div>
      </div>

      <div style={{ display: 'flex', gap: 8, overflowX: 'auto', padding: '0 20px 14px', margin: 0 }}>
        {filters.map(f => {
          const on = filter === f.id;
          return (
            <button key={f.id} onClick={() => setFilter(f.id)} style={{
              flexShrink: 0, padding: '8px 16px', borderRadius: 99,
              background: on ? VX.gradPurple : VX.card,
              border: `1px solid ${on ? 'transparent' : VX.stroke}`,
              color: on ? '#fff' : VX.muted,
              fontSize: 12.5, fontWeight: 700, fontFamily: VX.dm, cursor: 'pointer',
              letterSpacing: 0.2,
              boxShadow: on ? `0 6px 14px -4px ${VX.primary}` : 'none',
            }}>{f.label}</button>
          );
        })}
      </div>

      <div style={{ padding: '0 20px', display: 'flex', flexDirection: 'column', gap: 10 }}>
        {shown.map(t => {
          const isDone = done.has(t.i);
          return (
            <div key={t.i} style={{
              padding: 14, borderRadius: 14, background: VX.card,
              border: `1px solid ${VX.stroke}`,
              display: 'flex', alignItems: 'center', gap: 12,
              opacity: isDone ? 0.55 : 1, transition: 'opacity .15s',
              position: 'relative', overflow: 'hidden',
            }}>
              <VXPlatformIcon platform={t.p} size={44}/>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 2, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{t.user}</div>
                <div style={{ fontSize: 12, color: VX.muted, marginBottom: 4 }}>{t.action}</div>
                <div style={{ fontFamily: VX.syne, fontWeight: 800, fontSize: 14, color: VX.green }}>+${t.reward.toFixed(2)}</div>
              </div>
              <button onClick={() => toggle(t.i)} style={{
                padding: isDone ? '8px 12px' : '9px 14px', borderRadius: 8, flexShrink: 0,
                background: isDone ? 'rgba(16,185,129,0.15)' : 'transparent',
                border: isDone ? `1px solid ${VX.green}` : `1.5px solid ${VX.strokeHi}`,
                color: isDone ? VX.green : VX.primaryHi,
                fontFamily: VX.dm, fontWeight: 700, fontSize: 12, cursor: 'pointer',
                display: 'flex', alignItems: 'center', gap: 4,
              }}>
                {isDone ? (<><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>Done</>) : 'Start'}
              </button>
            </div>
          );
        })}
        {shown.length === 0 && (
          <div style={{ padding: '40px 20px', textAlign: 'center', color: VX.muted }}>
            <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 4 }}>No tasks in this category</div>
            <div style={{ fontSize: 12 }}>Try another filter</div>
          </div>
        )}
      </div>
    </VXScreen>
  );
}

function Phone({ children }) {
  return <div className="vx-phone"><div className="vx-phone-inner">{children}</div></div>;
}

function FullApp() {
  const [screen, setScreen] = React.useState(() => {
    try { return localStorage.getItem('chain-screen') || 'login'; }
    catch { return 'login'; }
  });
  React.useEffect(() => { try { localStorage.setItem('chain-screen', screen); } catch {} }, [screen]);

  const showNav = !['login', 'signup'].includes(screen);
  const nav = (s) => setScreen(s);

  let body;
  if (screen === 'login') body = <LoginScreen onLogin={() => setScreen('dashboard')} onSignup={() => setScreen('signup')} />;
  else if (screen === 'signup') body = <SignupScreen onBack={() => setScreen('login')} onDone={() => setScreen('dashboard')} />;
  else if (screen === 'dashboard') body = <DashboardScreen onNav={nav} />;
  else if (screen === 'vip') body = <VIPScreen onNav={nav} />;
  else if (screen === 'tasks') body = <TasksScreen onNav={nav} />;
  else if (screen === 'withdraw') body = <WithdrawScreen onNav={nav} />;
  else if (screen === 'profile') body = <ProfileScreen onNav={nav} />;

  return (
    <Phone>
      {body}
      {showNav && <VXBottomNav active={screen} onNav={nav} />}
    </Phone>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<FullApp />);
</script>
